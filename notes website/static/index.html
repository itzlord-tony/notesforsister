<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoteShare | Premium Notes Sharing</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📚</text></svg>">
</head>
<body>
    <div class="background-overlay"></div>
    <div class="container">
        <header>
            <div class="logo">
                <i class="fas fa-graduation-cap"></i>
                <h1>NoteShare</h1>
            </div>
            <p class="subtitle">Share your notes seamlessly with elegance.</p>
        </header>

        <main>
            <section class="upload-section glass">
                <h2><i class="fas fa-cloud-upload-alt"></i> Upload Notes</h2>
                <form id="uploadForm">
                    <div class="file-input-wrapper">
                        <input type="file" id="fileInput" name="file" hidden>
                        <label for="fileInput" class="file-label">
                            <i class="fas fa-file-pdf"></i>
                            <span>Choose a file or drag it here</span>
                        </label>
                    </div>
                    <div id="fileInfo" class="file-info hidden">
                        <span id="fileName"></span>
                        <button type="button" id="removeFile"><i class="fas fa-times"></i></button>
                    </div>
                    <button type="submit" class="btn-primary" id="uploadBtn">
                        <span class="btn-text">Upload Now</span>
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </form>
                <div id="uploadStatus" class="status-msg"></div>
            </section>

            <section class="files-section glass">
                <div class="section-header">
                    <h2><i class="fas fa-folder-open"></i> Available Notes</h2>
                    <button id="refreshBtn" class="btn-icon"><i class="fas fa-sync-alt"></i></button>
                </div>
                <div id="fileList" class="file-grid">
                    <div class="loader">Loading notes...</div>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 NoteShare. Crafted with love for family.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
